<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Viewer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --accent: #a855f7;
    --accent2: #6366f1;
    --text: #f1f0f5;
    --muted: #6b6880;
    --border: #2a2838;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }
  .band-photo {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    object-fit: cover;
    object-position: center top;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 36px;
    max-width: 600px;
    width: 100%;
    position: relative;
    box-shadow: 0 0 60px #a855f720;
  }
  .song-title {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .lyric {
    font-size: 1.75rem;
    font-weight: 600;
    line-height: 1.4;
    min-height: 100px;
    display: flex;
    align-items: center;
    transition: opacity 0.3s;
  }
  .lyric.fade { opacity: 0; }
  .counter {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 20px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    align-items: center;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-nav {
    background: var(--border);
    color: var(--text);
    padding: 12px 18px;
    font-size: 1.1rem;
  }
  .btn-nav:hover { background: #3a3850; }
  .btn-random {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 12px 20px;
    flex: 1;
  }
  .btn-random:hover { opacity: 0.85; transform: scale(1.02); }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0 20px;
  }
  .bottom-row {
    display: flex;
    gap: 10px;
  }
  .btn-stream {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 700;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-stream:hover { opacity: 0.85; transform: scale(1.02); }
  .btn-spotify { background: #1DB954; color: #000; }
  .btn-apple { background: #fc3c44; color: #fff; }
  .btn-lyrics {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 16px;
    font-size: 0.8rem;
  }
  .btn-lyrics:hover { border-color: var(--accent); color: var(--accent); }
  .btn-more {
    display: block;
    text-align: center;
    margin-top: 16px;
    padding: 13px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-more:hover { border-color: var(--accent); color: var(--accent); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal h2 {
    font-size: 1.2rem;
    margin-bottom: 6px;
    color: var(--accent);
  }
  .modal .album { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; }
  .modal pre {
    white-space: pre-wrap;
    font-family: inherit;
    line-height: 1.8;
    font-size: 0.95rem;
    color: var(--text);
  }
  .btn-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-close:hover { color: var(--text); }
</style>
</head>
<body>

// ============================================================
// State
let currentSong = 0;
let currentLine = 0;
let allLyrics = []; // flat list of {songIdx, lineIdx}

function buildIndex() {
  allLyrics = [];
  songs.forEach((s, si) => s.lyrics.forEach((_, li) => allLyrics.push({si, li})));
}

function randomLyric() {
  const r = Math.floor(Math.random() * allLyrics.length);
  currentSong = allLyrics[r].si;
  currentLine = allLyrics[r].li;
  showWithFade();
}

function navigate(dir) {
  // Find current position in flat index
  let pos = allLyrics.findIndex(x => x.si === currentSong && x.li === currentLine);
  pos = (pos + dir + allLyrics.length) % allLyrics.length;
  currentSong = allLyrics[pos].si;
  currentLine = allLyrics[pos].li;
  showWithFade();
}

function showWithFade() {
  const el = document.getElementById('lyricDisplay');
  el.classList.add('fade');
  setTimeout(() => {
    render();
    el.classList.remove('fade');
  }, 200);
}

function render() {
  const song = songs[currentSong];
  document.getElementById('songTitle').textContent = `${song.title} — ${song.album}`;
  document.getElementById('lyricDisplay').textContent = `"${song.lyrics[currentLine]}"`;

  // counter: global position
  let pos = allLyrics.findIndex(x => x.si === currentSong && x.li === currentLine);
  document.getElementById('counter').textContent = `Lyric ${pos + 1} of ${allLyrics.length}`;

  // Streaming links
  const sp = document.getElementById('spotifyBtn');
  const ap = document.getElementById('appleBtn');
  sp.href = song.spotifyUrl;
  ap.href = song.appleUrl;
}

function openModal() {
  const song = songs[currentSong];
  document.getElementById('modalTitle').textContent = song.title;
  document.getElementById('modalAlbum').textContent = song.album;
  document.getElementById('modalLyrics').textContent = song.fullLyrics;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Init
buildIndex();
randomLyric();
</script>
